{% extends "base.html" %}
{% block content %}
<section class="auth-shell">
  <div class="auth-panel">
    <div class="auth-copy">
      <p class="eyebrow">Secure access</p>
      <h1>Lubricant Pricing Studio</h1>
      <p>Sign in to manage product records, update sales pricing, and export controlled pricing sheets for the team.</p>
    </div>
    <form method="post" class="auth-form">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="primary-button full-width" type="submit">Login</button>
    </form>
  </div>
</section>
{% endblock %}
